<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEWS STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --accent-color: #007bff;
            --text-color: #24292e;
            --sub-text-color: #586069;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-family: 'Orbitron', sans-serif; margin: 20px 0; }

        /* カテゴリボタン */
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 30px; }
        .nav-buttons a {
            text-decoration: none; color: var(--sub-text-color);
            padding: 10px 20px; border: 2px solid #e1e4e8;
            border-radius: 30px; background: var(--card-bg); font-weight: bold;
        }
        .nav-buttons a.active { border-color: var(--accent-color); color: var(--accent-color); }

        /* ニュースカード (縦並び) */
        .news-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 30px; }
        
        .news-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .news-card:hover { transform: translateY(-5px); }

        /* 上のデカ画像 */
        .card-image {
            width: 100%;
            aspect-ratio: 16 / 9; /* 横長に固定 */
            object-fit: cover;
            display: block;
        }

        /* 下のテキストエリア */
        .card-content { padding: 20px; }

        .news-card h2 {
            font-size: 1.2rem; /* 中ぐらい */
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        .news-card p {
            font-size: 0.9rem; /* 小さめ */
            color: var(--sub-text-color);
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>NEWS STREAM</h1>
    <div class="nav-buttons">
        <a href="/it" class="{{ 'active' if mode == 'it' }}">IT</a>
        <a href="/sports" class="{{ 'active' if mode == 'sports' }}">Sports</a>
        <a href="/science" class="{{ 'active' if mode == 'science' }}">Science</a>
    </div>

    <div class="news-container">
        {% for item in news %}
        <a href="{{ item.link }}" target="_blank" class="news-card">
            <img src="{{ item.img_url }}" alt="" class="card-image">
            <div class="card-content">
                <h2>{{ item.title }}</h2>
                <p>{{ item.summary }}</p>
            </div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
