<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEWS STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --accent-color: #007bff;
            --text-color: #24292e;
            --sub-text-color: #586069;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 20px 0 30px 0;
            letter-spacing: 1px;
            text-align: center;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .nav-buttons a {
            text-decoration: none;
            color: var(--sub-text-color);
            padding: 10px 25px;
            border: 2px solid #e1e4e8;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.2s;
            background: var(--card-bg);
        }

        .nav-buttons a:hover, .nav-buttons a.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: #eaf5ff;
        }

        .news-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-card {
            background: var(--card-bg);
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            overflow: hidden;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .card-image {
            width: 150px;
            height: 100px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .card-content {
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .news-card h2 {
            font-size: 1.05rem;
            margin: 0 0 8px 0;
            color: var(--text-color);
            line-height: 1.5;
        }

        .news-card .meta {
            font-size: 0.8rem;
            color: var(--sub-text-color);
        }

        /* スマホ向けの表示調整 */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .card-image {
                width: 100px;
                height: 80px;
            }
            .news-card h2 {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <h1>NEWS STREAM</h1>
    <div class="nav-buttons">
        <a href="/it" class="{{ 'active' if mode == 'it' }}">IT</a>
        <a href="/sports" class="{{ 'active' if mode == 'sports' }}">Sports</a>
        <a href="/science" class="{{ 'active' if mode == 'science' }}">Science</a>
    </div>
    <div class="news-container">
        {% for item in news %}
        <a href="{{ item.link }}" target="_blank" class="news-card">
            <img src="{{ item.img_url }}" alt="{{ item.title }}" class="card-image">
            <div class="card-content">
                <h2>{{ item.title }}</h2>
                <div class="meta">
                    {{ mode.upper() }} / NHK NEWS
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
