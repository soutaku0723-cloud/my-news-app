<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --accent-color: #007bff;
            --text-color: #24292e;
            --sub-text-color: #586069;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 20px 0 30px 0;
            letter-spacing: 1px;
            text-align: center;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-buttons a {
            text-decoration: none;
            color: var(--sub-text-color);
            padding: 10px 25px;
            border: 2px solid #e1e4e8;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.2s;
            background: var(--card-bg);
        }

        .nav-buttons a:hover, .nav-buttons a.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: #eaf5ff;
        }

        .news-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            border: 1px solid #e1e4e8;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background-color: #ddd;
        }

        .card-content {
            padding: 20px;
        }

        .news-card h2 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            line-height: 1.4;
            color: var(--text-color);
        }

        .news-card p {
            font-size: 0.9rem;
            color: var(--sub-text-color);
            line-height: 1.6;
            margin: 0;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .news-card h2 { font-size: 1.1rem; }
            .nav-buttons a { padding: 8px 15px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <h1>NEWS STREAM</h1>
    
    <div class="nav-buttons">
        <a href="/others" class="{{ 'active' if mode == 'others' }}">スポーツ</a>
        <a href="/sports" class="{{ 'active' if mode == 'sports' }}">政治外交</a>
        <a href="/politics" class="{{ 'active' if mode == 'politics' }}">事件、事故</a>
    </div>

    <div class="news-container">
        {% for item in news %}
        <a href="{{ item.link }}" target="_blank" class="news-card">
            <img src="{{ item.img_url }}" alt="" class="card-image">
            <div class="card-content">
                <h2>{{ item.title }}</h2>
                <p>{{ item.summary }}</p>
            </div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
