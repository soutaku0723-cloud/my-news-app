<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>News Stream - White & Green</title>
    <style>
        /* 背景を明るい白に、文字を濃いグレーにして読みやすく */
        body { 
            background-color: #F0F2F5; 
            color: #1a1a1a; 
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
            padding: 40px; 
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { 
            color: #1DB954; 
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 800;
        }
        
        /* ボタン：白ベースに緑の枠線 */
        .btn { 
            background-color: #FFFFFF; 
            color: #1DB954; 
            padding: 12px 28px; 
            text-decoration: none; 
            border-radius: 8px; 
            margin-right: 12px; 
            font-weight: bold;
            display: inline-block;
            border: 2px solid #1DB954;
            transition: all 0.2s ease;
        }
        
        /* ホバーした時に緑が反転する */
        .btn:hover { 
            background-color: #1DB954; 
            color: #FFFFFF; 
            transform: translateY(-2px);
        }
        
        /* ニュースカード：白背景に薄い影 */
        .card { 
            background-color: #FFFFFF; 
            padding: 20px; 
            margin-top: 16px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s; 
        }
        
        .card:hover { 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        /* スコア：薄い緑の背景に濃い緑の文字 */
        .score { 
            background-color: #e8f5e9; 
            color: #1DB954; 
            font-weight: bold; 
            padding: 6px 16px; 
            border-radius: 20px; 
            margin-right: 20px; 
            min-width: 60px; 
            text-align: center; 
            font-size: 0.9rem;
        }
        
        /* ニュースタイトル */
        .content a { 
            color: #1a1a1a; 
            text-decoration: none; 
            font-size: 1.1rem; 
            font-weight: 600; 
        }
        
        .content a:hover { 
            color: #1DB954;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>News Stream: {{ mode.upper() }}</h1>
        
        <div style="margin-bottom: 40px;">
            <a href="/?mode=it" class="btn">IT</a>
            <a href="/?mode=sports" class="btn">Sports</a>
            <a href="/?mode=science" class="btn">Science</a>
        </div>

        {% for item in news %}
        <div class="card">
            <div class="score">{{ item.score }}pt</div>
            <div class="content">
                <a href="{{ item.link }}" target="_blank">{{ item.title }}</a>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
